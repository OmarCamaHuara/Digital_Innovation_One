<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/main.css">
    <title>NETFLIX-CLONE</title>
</head>
<body>
    <header>
        <div class="container">
            <img class="logo" src="./img/netflix-3.svg" alt="">
            <nav>
                <a href="#">Inicio</a>
                <a href="#">Séries</a>
                <a href="#">Filmes</a>
                <a href="#">Documentários</a>
            </nav>
        </div>
    </header>
    
    <main>
        <div class="filme-principal">
            <div class="container-bg">
                <h3 class="title container">HOUSE OF CARDS</h3>
                <p class="description container">Com Frank fora da jogada, Claire Underwood pode exercer todo o seu <br> poder como a primeira presidente mulher dos Estados Unidos. <br> Mas poderosos inimigos estão à espreita.</p>
                <div class="botoes container">
                    <button role="button" class="botao">
                        <i class="fas fa-play"></i>
                        ASSISTIR AGORA
                    </button>
                    <button role="button" class="botao">
                        <i class="fas fa-info-circle"></i>
                        MAIS INFORMCAÇÕES
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://kit.fontawesome.com/fc2bc854da.js" crossorigin="anonymous"></script>
</body>
</html>
